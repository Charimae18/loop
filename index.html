<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>JavaScript Loops</title>
</head>
<body>
    <h1>JS Loops</h1>

    <div class="grid">
        <div class="card"><h3>for loop</h3><p id="for-loop"></p></div>
        <div class="card"><h3>while loop</h3><p id="while-loop"></p></div>
        <div class="card"><h3>do...while loop</h3><p id="dowhile-loop"></p></div>
        <div class="card"><h3>for...in loop</h3><p id="forin-loop"></p></div>
        <div class="card"><h3>for...of loop</h3><p id="forof-loop"></p></div>
        <div class="card"><h3>for each loop</h3><p id="foreach-loop"></p></div>
    </div>

    <script src="js/loops.js"></script>
</body>
</html>
